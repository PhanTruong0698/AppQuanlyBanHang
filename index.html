<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sổ bán bánh</title>

<style>
body{font-family:Arial;background:#f2f2f2;padding:10px}
h2{margin-top:20px}
input,select,button{width:100%;padding:12px;margin:6px 0;font-size:16px}
.section{background:#fff;padding:12px;border-radius:6px;margin-bottom:15px}
button{border:none;color:#fff;border-radius:4px}
.btn-add{background:#4CAF50}
.btn-clear{background:#e74c3c}
.row{
  display:grid;
  grid-template-columns: 40px 120px 10px 80px;
  align-items:center;
  gap: 6px;
  padding:6px 0;
  border-bottom:1px solid #ddd;
}

.row .sl{ text-align:left; }
.row .item{ text-align:left; }
.row .sep{ text-align:center; }
.row .money{ text-align:right; }
.total{font-weight:bold;font-size:18px;margin-top:10px}
.report{background:#fff;padding:12px;border-radius:6px;margin-top:10px}

.btn-report{
  background:#ffffff;
  color:#007bff;      /* xanh blue */
  border:1px solid #007bff;
  font-weight:bold;
}

</style>
</head>

<body>

<h2>🍔 Quản lý mặt hàng</h2>
<div class="section">
<input id="itemName" placeholder="Tên mặt hàng">
<input id="itemPrice" type="number" placeholder="Giá tiền">
<button class="btn-add" onclick="addItem()">➕ Thêm mặt hàng</button>
<button class="btn-clear" onclick="clearItems()">🗑 Xóa toàn bộ mặt hàng</button>
</div>

<h2>🧾 Bán hàng</h2>
<div class="section">
<select id="thu" onchange="renderItems()">
<option>Thứ 2</option><option>Thứ 3</option><option>Thứ 4</option>
<option>Thứ 5</option><option>Thứ 6</option><option>Thứ 7</option><option>Chủ nhật</option>
</select>

<select id="itemSelect" onchange="calcTien()"></select>

<input id="sl" type="number" placeholder="Số lượng" oninput="calcTien()">
<input id="tien" type="number" placeholder="Số tiền dòng này" readonly>

<button class="btn-add" onclick="addSale()">➕ Thêm</button>
<button class="btn-clear" onclick="clearSales()">🗑 Clear dữ liệu tuần</button>
</div>

<div class="total">Tổng tuần: <span id="tong">0</span> đ</div>

<button class="btn-report" onclick="showReport()">📄 Xem báo cáo</button>
<div id="report"></div>

<script>
let items = JSON.parse(localStorage.getItem("items")||"[]");
let sales = JSON.parse(localStorage.getItem("sales")||"[]");

function save(){
  localStorage.setItem("items",JSON.stringify(items));
  localStorage.setItem("sales",JSON.stringify(sales));
}

function addItem(){
  let n=itemName.value.trim();
  let p=Number(itemPrice.value);
  if(!n||p<=0) return alert("Nhập đủ tên và giá");
  items.push({name:n,price:p});
  save();
  renderItems();
  itemName.value=itemPrice.value="";
}

function clearItems(){
  if(confirm("Xóa toàn bộ mặt hàng và dữ liệu bán?")){
    items=[]; sales=[];
    localStorage.clear();
    renderItems(); renderTotal(); report.innerHTML="";
  }
}

function renderItems(){
  itemSelect.innerHTML="";
  items.forEach((i,idx)=>{
    let o=document.createElement("option");
    o.value=idx;
    o.text=i.name;
    itemSelect.appendChild(o);
  });
}

function calcTien(){
  let sl=Number(document.getElementById("sl").value);
  let i=items[itemSelect.value];
  if(sl>0 && i){
    tien.value = sl * i.price;
  }
}

function addSale(){
  let i=items[itemSelect.value];
  let slVal=Number(sl.value);
  let tienVal=Number(tien.value);
  if(!i||slVal<=0) return alert("Thiếu dữ liệu");
  let thuVal = document.getElementById("thu").value;

  sales.push({
	thu: thuVal,
	item: i.name,
	price: i.price,
	sl: slVal
});
  save();
  sl.value=tien.value="";
  renderTotal();
  renderItems();
}

function clearSales(){
  if(confirm("Clear toàn bộ dữ liệu tuần?")){
    sales=[];
    save();
    renderTotal();
    report.innerHTML="";
  }
}

function renderTotal(){
  let t=0;
  sales.forEach(s=>t+=s.sl*s.price);
  tong.innerText=t.toLocaleString();
}

function renderItems(){
  let thuVal = document.getElementById("thu").value;

  // Lấy danh sách mặt hàng đã bán trong Thứ đang chọn
  let daBan = sales
    .filter(s => s.thu === thuVal)
    .map(s => s.item);

  itemSelect.innerHTML = "";

  items.forEach((i, idx) => {
    if (daBan.includes(i.name)) return; // đã bán → không hiện

    let o = document.createElement("option");
    o.value = idx;
    o.text = i.name;
    itemSelect.appendChild(o);
  });
}


function showReport(){
  let byDay = {};
  let grandTotal = 0;

  // Gom dữ liệu theo Thứ -> Mặt hàng
  sales.forEach(s=>{
    let day = s.thu || "Khác";
    if(!byDay[day]) byDay[day] = {};

    let key = s.item + "|" + s.price;
    if(!byDay[day][key]){
      byDay[day][key] = { item:s.item, price:s.price, sl:0 };
    }
    byDay[day][key].sl += s.sl;
  });

  let html = '<div class="report">';

  for(let day in byDay){
    html += `<div style="font-weight:bold;margin-top:10px">${day}</div>`;

    let dayTotal = 0;

    for(let k in byDay[day]){
      let r = byDay[day][k];
      let thanhTien = r.sl * r.price;
      dayTotal += thanhTien;
      grandTotal += thanhTien;

      html += `
        <div class="row">
          <div class="sl">${r.sl}</div>
          <div class="item">${r.item}</div>
          <div class="sep">:</div>
          <div class="money">${thanhTien.toLocaleString()}</div>
        </div>
      `;
    }

    html += `<div style="border-bottom:1px dashed #999;margin:6px 0"></div>`;
  }

  html += `<div class="total">Tổng tiền: ${grandTotal.toLocaleString()} đ</div>`;
  html += `<div style="border-bottom:2px solid #000;margin-top:6px"></div>`;
  html += '</div>';

  document.getElementById("report").innerHTML = html;
}


renderItems();
renderTotal();
</script>

</body>
</html>
