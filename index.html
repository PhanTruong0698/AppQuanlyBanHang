<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1769aa">
  <title>Phần mềm quản lý bán hàng</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/app-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/app-icon.svg">
  <link rel="stylesheet" href="style.css?v=4">
  <script src="app.js?v=4" defer></script>
</head>
<body>
  <svg class="svg-sprite" aria-hidden="true">
    <symbol id="icon-store" viewBox="0 0 24 24">
      <path d="M3 9l1.2-5h15.6L21 9"></path><path d="M5 9v10h14V9"></path><path d="M9 19v-6h6v6"></path><path d="M3 9h18"></path>
    </symbol>
    <symbol id="icon-box" viewBox="0 0 24 24">
      <path d="M21 8l-9-5-9 5 9 5 9-5z"></path><path d="M3 8v8l9 5 9-5V8"></path><path d="M12 13v8"></path>
    </symbol>
    <symbol id="icon-clipboard" viewBox="0 0 24 24">
      <path d="M9 5h6"></path><path d="M9 3h6v4H9z"></path><path d="M5 5h3v2h8V5h3v16H5z"></path><path d="M8 12h8"></path><path d="M8 16h6"></path>
    </symbol>
    <symbol id="icon-plus" viewBox="0 0 24 24">
      <path d="M12 5v14"></path><path d="M5 12h14"></path>
    </symbol>
    <symbol id="icon-x" viewBox="0 0 24 24">
      <path d="M18 6L6 18"></path><path d="M6 6l12 12"></path>
    </symbol>
    <symbol id="icon-file" viewBox="0 0 24 24">
      <path d="M14 3H6v18h12V7z"></path><path d="M14 3v4h4"></path><path d="M8 13h8"></path><path d="M8 17h6"></path>
    </symbol>
    <symbol id="icon-table" viewBox="0 0 24 24">
      <path d="M4 5h16v14H4z"></path><path d="M4 10h16"></path><path d="M9 5v14"></path><path d="M15 5v14"></path>
    </symbol>
    <symbol id="icon-download" viewBox="0 0 24 24">
      <path d="M12 3v12"></path><path d="M7 10l5 5 5-5"></path><path d="M5 21h14"></path>
    </symbol>
    <symbol id="icon-upload" viewBox="0 0 24 24">
      <path d="M12 15V3"></path><path d="M7 8l5-5 5 5"></path><path d="M5 21h14"></path>
    </symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24">
      <path d="M4 7h16"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M6 7l1 14h10l1-14"></path><path d="M9 7V4h6v3"></path>
    </symbol>
    <symbol id="icon-calendar" viewBox="0 0 24 24">
      <path d="M7 3v4"></path><path d="M17 3v4"></path><path d="M4 8h16"></path><path d="M5 5h14v16H5z"></path>
    </symbol>
  </svg>

  <main class="app">
    <header class="app-header hero">
      <div class="hero-copy">
        <span class="eyebrow"><svg class="icon"><use href="#icon-store"></use></svg>Sổ bán hàng</span>
        <h1>Quản lý bán hàng</h1>
        <p>Theo dõi mặt hàng, số lượng bán theo ngày và tổng tiền trong tuần.</p>
      </div>
      <div class="hero-art" aria-hidden="true">
        <img src="assets/sales-hero.png" alt="">
      </div>
    </header>

    <section class="panel week-panel" aria-labelledby="weekTitle">
      <div>
        <span class="section-label"><svg class="icon"><use href="#icon-calendar"></use></svg>Tuần báo cáo</span>
        <h2 id="weekTitle">Chọn tuần làm việc</h2>
        <p id="weekRange" class="week-range">Đang tải tuần...</p>
      </div>
      <div class="week-controls">
        <label class="field">
          <span>Tuần bắt đầu</span>
          <input id="weekStart" type="date">
        </label>
        <button class="btn btn-outline" id="currentWeek" type="button">Tuần hiện tại</button>
      </div>
    </section>

    <nav class="tabs" aria-label="Chọn khu vực làm việc">
      <button class="tab-btn active" id="reportTab" type="button" data-tab-target="reportPanel">Nhập báo cáo</button>
      <button class="tab-btn" id="itemsTab" type="button" data-tab-target="itemsPanel">Quản lý mặt hàng</button>
    </nav>

    <section class="panel input-panel primary-workflow tab-panel active" id="reportPanel" aria-labelledby="reportTitle">
      <div class="panel-heading">
        <div>
          <span class="section-label"><svg class="icon"><use href="#icon-clipboard"></use></svg>Bán trong tuần</span>
          <h2 id="reportTitle">Nhập báo cáo</h2>
        </div>
      </div>
      <form id="reportForm" class="form-grid report-grid">
        <label class="field">
          <span>Ngày bán</span>
          <select id="day" name="day" required></select>
        </label>
        <label class="field">
          <span>Mặt hàng</span>
          <select id="itemSelect" name="itemSelect" required></select>
        </label>
        <label class="field">
          <span>Số lượng</span>
          <input id="qty" name="qty" type="number" min="0.01" step="any" placeholder="Ví dụ: 1.5" required>
        </label>
        <button class="btn btn-primary" type="submit"><svg class="icon"><use href="#icon-plus"></use></svg>Thêm vào báo cáo</button>
        <button class="btn btn-muted" id="cancelReportEdit" type="button" hidden><svg class="icon"><use href="#icon-x"></use></svg>Hủy sửa</button>
      </form>
      <div class="copy-row" aria-label="Sao chép báo cáo giữa các ngày">
        <label class="field">
          <span>Sao chép từ</span>
          <select id="copyFromDay"></select>
        </label>
        <label class="field">
          <span>Sang ngày</span>
          <select id="copyToDay"></select>
        </label>
        <button class="btn btn-outline" id="copyDayReports" type="button"><svg class="icon"><use href="#icon-clipboard"></use></svg>Sao chép báo cáo</button>
      </div>
      <p id="reportMessage" class="message" role="status" aria-live="polite"></p>
    </section>

    <section class="panel input-panel tab-panel" id="itemsPanel" aria-labelledby="itemsTitle" hidden>
      <div class="panel-heading">
        <div>
          <span class="section-label"><svg class="icon"><use href="#icon-box"></use></svg>Danh mục</span>
          <h2 id="itemsTitle">Quản lý mặt hàng</h2>
        </div>
      </div>
      <form id="itemForm" class="form-grid item-grid">
        <label class="field">
          <span>Tên mặt hàng</span>
          <input id="itemName" name="itemName" autocomplete="off" placeholder="Ví dụ: Cafe đen" required>
        </label>
        <label class="field">
          <span>Đơn giá</span>
          <input id="itemPrice" name="itemPrice" type="number" min="0.01" step="any" placeholder="Ví dụ: 3.5" required>
        </label>
        <button class="btn btn-primary" type="submit"><svg class="icon"><use href="#icon-plus"></use></svg>Thêm / Cập nhật</button>
        <button class="btn btn-muted" id="cancelItemEdit" type="button" hidden><svg class="icon"><use href="#icon-x"></use></svg>Hủy sửa</button>
      </form>
      <p id="itemMessage" class="message" role="status" aria-live="polite"></p>
      <div id="itemList" class="list" aria-live="polite"></div>
    </section>

    <section class="panel summary report-only" aria-labelledby="summaryTitle">
      <div class="summary-total">
        <span class="section-label"><svg class="icon"><use href="#icon-table"></use></svg>Tổng kết</span>
        <h2 id="summaryTitle">Doanh thu tuần</h2>
        <p class="total"><strong id="weekTotal">0</strong></p>
        <div class="stat-grid" aria-label="Thống kê nhanh">
          <div class="stat-chip">
            <span>Số dòng</span>
            <strong id="statRows">0</strong>
          </div>
          <div class="stat-chip">
            <span>Mặt hàng</span>
            <strong id="statItems">0</strong>
          </div>
          <div class="stat-chip">
            <span>Ngày cao nhất</span>
            <strong id="statBestDay">-</strong>
          </div>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-outline" id="exportTxt" type="button"><svg class="icon"><use href="#icon-file"></use></svg>Xuất TXT</button>
        <button class="btn btn-outline" id="exportCsv" type="button"><svg class="icon"><use href="#icon-table"></use></svg>Xuất CSV</button>
        <button class="btn btn-outline" id="backupData" type="button"><svg class="icon"><use href="#icon-download"></use></svg>Sao lưu JSON</button>
        <label class="btn btn-outline file-btn">
          <svg class="icon"><use href="#icon-upload"></use></svg>Khôi phục JSON
          <input id="restoreData" type="file" accept="application/json,.json">
        </label>
        <button class="btn btn-danger" id="clearReports" type="button"><svg class="icon"><use href="#icon-trash"></use></svg>Xóa báo cáo tuần</button>
        <button class="btn btn-danger" id="clearAll" type="button"><svg class="icon"><use href="#icon-trash"></use></svg>Xóa toàn bộ dữ liệu</button>
      </div>
    </section>

    <section class="panel report-only" aria-labelledby="reportViewTitle">
      <div class="panel-heading">
        <div>
          <span class="section-label"><svg class="icon"><use href="#icon-table"></use></svg>Chi tiết</span>
          <h2 id="reportViewTitle">Báo cáo tuần</h2>
        </div>
      </div>
      <div id="reportView" class="report-view" aria-live="polite"></div>
    </section>
  </main>
</body>
</html>
