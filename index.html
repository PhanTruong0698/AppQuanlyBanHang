<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Phần mềm quản lý bán hàng</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
</head>
<body>
  <main class="app">
    <header class="app-header">
      <div>
        <span class="eyebrow">Sổ bán hàng</span>
        <h1>Quản lý bán hàng</h1>
        <p>Theo dõi mặt hàng, số lượng bán theo ngày và tổng tiền trong tuần.</p>
      </div>
    </header>

    <section class="panel" aria-labelledby="itemsTitle">
      <div class="panel-heading">
        <div>
          <span class="section-label">Danh mục</span>
          <h2 id="itemsTitle">Quản lý mặt hàng</h2>
        </div>
      </div>
      <form id="itemForm" class="form-grid item-grid">
        <label class="field">
          <span>Tên mặt hàng</span>
          <input id="itemName" name="itemName" autocomplete="off" placeholder="Ví dụ: Cafe đen" required>
        </label>
        <label class="field">
          <span>Đơn giá</span>
          <input id="itemPrice" name="itemPrice" type="number" min="1" step="1" placeholder="Ví dụ: 15000" required>
        </label>
        <button class="btn btn-primary" type="submit">Thêm / Cập nhật</button>
        <button class="btn btn-muted" id="cancelItemEdit" type="button" hidden>Hủy sửa</button>
      </form>
      <p id="itemMessage" class="message" role="status" aria-live="polite"></p>
      <div id="itemList" class="list" aria-live="polite"></div>
    </section>

    <section class="panel" aria-labelledby="reportTitle">
      <div class="panel-heading">
        <div>
          <span class="section-label">Bán trong tuần</span>
          <h2 id="reportTitle">Nhập báo cáo</h2>
        </div>
      </div>
      <form id="reportForm" class="form-grid report-grid">
        <label class="field">
          <span>Ngày bán</span>
          <select id="day" name="day" required></select>
        </label>
        <label class="field">
          <span>Mặt hàng</span>
          <select id="itemSelect" name="itemSelect" required></select>
        </label>
        <label class="field">
          <span>Số lượng</span>
          <input id="qty" name="qty" type="number" min="1" step="1" placeholder="Ví dụ: 10" required>
        </label>
        <button class="btn btn-primary" type="submit">Thêm vào báo cáo</button>
        <button class="btn btn-muted" id="cancelReportEdit" type="button" hidden>Hủy sửa</button>
      </form>
      <p id="reportMessage" class="message" role="status" aria-live="polite"></p>
    </section>

    <section class="panel summary" aria-labelledby="summaryTitle">
      <div class="summary-total">
        <span class="section-label">Tổng kết</span>
        <h2 id="summaryTitle">Doanh thu tuần</h2>
        <p class="total"><strong id="weekTotal">0</strong></p>
      </div>
      <div class="actions">
        <button class="btn btn-outline" id="exportTxt" type="button">Xuất TXT</button>
        <button class="btn btn-outline" id="exportCsv" type="button">Xuất CSV</button>
        <button class="btn btn-outline" id="backupData" type="button">Sao lưu JSON</button>
        <label class="btn btn-outline file-btn">
          Khôi phục JSON
          <input id="restoreData" type="file" accept="application/json,.json">
        </label>
        <button class="btn btn-danger" id="clearReports" type="button">Xóa báo cáo tuần</button>
        <button class="btn btn-danger" id="clearAll" type="button">Xóa toàn bộ dữ liệu</button>
      </div>
    </section>

    <section class="panel" aria-labelledby="reportViewTitle">
      <div class="panel-heading">
        <div>
          <span class="section-label">Chi tiết</span>
          <h2 id="reportViewTitle">Báo cáo tuần</h2>
        </div>
      </div>
      <div id="reportView" class="report-view" aria-live="polite"></div>
    </section>
  </main>
</body>
</html>
