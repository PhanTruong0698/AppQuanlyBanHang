<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sổ bán bánh</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f6f6f6;
  margin: 0;
  padding: 12px;
}
h2 { margin-top: 0; }

.card {
  background: #fff;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 12px;
}

input, select, button {
  padding: 8px;
  margin: 4px 0;
  width: 100%;
  box-sizing: border-box;
}

button {
  background: #007bff;
  color: #fff;
  border: none;
  border-radius: 6px;
}

button.danger {
  background: #dc3545;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 8px;
}

th, td {
  border-bottom: 1px solid #ddd;
  padding: 6px;
  text-align: center;
  font-size: 14px;
}

.action-btn {
  padding: 4px 6px;
  font-size: 12px;
  margin: 2px;
}

.total {
  font-weight: bold;
  text-align: right;
  margin-top: 8px;
}

a {
  color: blue;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>📒 Sổ bán bánh</h2>

<div class="card">
  <label>Mặt hàng</label>
  <input id="itemName" placeholder="VD: Cù mì">

  <label>Số lượng</label>
  <input id="quantity" type="number">

  <label>Thành tiền</label>
  <input id="price" type="number">

  <button onclick="addItem()">➕ Thêm mặt hàng</button>
</div>

<div class="card">
  <h3>Danh sách mặt hàng</h3>
  <table>
    <thead>
      <tr>
        <th>Tên</th>
        <th>SL</th>
        <th>Tiền</th>
        <th>Thao tác</th>
      </tr>
    </thead>
    <tbody id="itemTable"></tbody>
  </table>

  <div class="total" id="totalMoney">Tổng: 0 đ</div>

  <button class="danger" onclick="clearAll()">🗑 Xoá tất cả</button>
</div>

<div class="card">
  <a href="#" onclick="exportReport()">📄 Xem báo cáo</a>
</div>

<script>
let items = JSON.parse(localStorage.getItem("items") || "[]");
let editIndex = -1;

function save() {
  localStorage.setItem("items", JSON.stringify(items));
}

function render() {
  const tbody = document.getElementById("itemTable");
  tbody.innerHTML = "";
  let total = 0;

  items.forEach((it, i) => {
    total += it.price;
    tbody.innerHTML += `
      <tr>
        <td>${it.name}</td>
        <td>${it.qty}</td>
        <td>${it.price}</td>
        <td>
          <button class="action-btn" onclick="editItem(${i})">✏️</button>
          <button class="action-btn danger" onclick="deleteItem(${i})">❌</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("totalMoney").innerText = "Tổng: " + total + " đ";
}

function addItem() {
  const name = itemName.value.trim();
  const qty = Number(quantity.value);
  const price = Number(price.value);

  if (!name || !qty || !price) {
    alert("Nhập đầy đủ thông tin");
    return;
  }

  if (editIndex >= 0) {
    items[editIndex] = { name, qty, price };
    editIndex = -1;
  } else {
    items.push({ name, qty, price });
  }

  itemName.value = "";
  quantity.value = "";
  price.value = "";

  save();
  render();
}

function deleteItem(i) {
  if (confirm("Xoá mặt hàng này?")) {
    items.splice(i, 1);
    save();
    render();
  }
}

function editItem(i) {
  const it = items[i];
  itemName.value = it.name;
  quantity.value = it.qty;
  price.value = it.price;
  editIndex = i;
}

function clearAll() {
  if (confirm("Xoá toàn bộ dữ liệu?")) {
    items = [];
    save();
    render();
  }
}

function exportReport() {
  let text = "BÁO CÁO BÁN HÀNG\n\n";
  let total = 0;
  items.forEach(it => {
    text += `${it.qty} ${it.name} : ${it.price} đ\n`;
    total += it.price;
  });
  text += "\n-----------------\nTổng tiền: " + total + " đ";
  alert(text);
}

render();
</script>

</body>
</html>
