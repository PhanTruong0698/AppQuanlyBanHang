<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Sổ bán bánh</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#f2f2f2;margin:0;padding:10px}
.card{background:#fff;border-radius:10px;padding:12px;margin-bottom:12px}
h2{margin:0 0 10px}
label{display:block;margin-top:8px;font-weight:600}
input,select,button{width:100%;padding:8px;margin-top:4px;font-size:15px}
button{border:none;border-radius:8px}
.btn-add{background:#4caf50;color:#fff}
.btn-danger{background:#e53935;color:#fff}
.btn-blue{background:#1976d2;color:#fff}
.row{display:flex;gap:8px;margin-top:8px}
.row>*{flex:1}
.line{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #eee}
.total{font-weight:bold;font-size:18px}
.report-line{display:flex;gap:6px}
.report-line span{min-width:auto}
</style>
</head>
<body>

<div class="card">
<h2>Quản lý mặt hàng</h2>
<label>Tên mặt hàng</label>
<input id="pName">
<label>Đơn giá</label>
<input id="pPrice" type="number">
<div class="row">
<button class="btn-add" onclick="addOrUpdateProduct()">Thêm / Cập nhật</button>
<button class="btn-danger" onclick="clearProducts()">Xóa tất cả</button>
</div>
<div id="productList"></div>
</div>

<div class="card">
<h2>Nhập báo cáo</h2>
<label>Thứ</label>
<select id="day">
<option>Thứ 2</option><option>Thứ 3</option><option>Thứ 4</option>
<option>Thứ 5</option><option>Thứ 6</option><option>Thứ 7</option><option>Chủ nhật</option>
</select>
<label>Mặt hàng</label>
<select id="productSelect"></select>
<label>Số lượng</label>
<input id="qty" type="number">
<button class="btn-add" onclick="addReport()">Thêm</button>
</div>

<div class="card">
<div class="total">Tổng tuần: <span id="weekTotal">0</span> đ</div>
<div class="row">
<button class="btn-blue" onclick="toggleReport()">Xem báo cáo</button>
<button onclick="exportTxt()">Xuất file text</button>
</div>
<div id="report" style="display:none"></div>
<button class="btn-danger" onclick="clearReports()">Xóa tất cả báo cáo</button>
</div>

<script>
let products = JSON.parse(localStorage.getItem('products')||'[]');
let reports = JSON.parse(localStorage.getItem('reports')||'[]');

function save(){
localStorage.setItem('products',JSON.stringify(products));
localStorage.setItem('reports',JSON.stringify(reports));
render();
}

function addOrUpdateProduct(){
const name=pName.value.trim();
const price=Number(pPrice.value);
if(!name||!price)return;
const p=products.find(x=>x.name===name);
if(p){p.price=price}else{products.push({name,price})}
pName.value='';pPrice.value='';
save();
}

function clearProducts(){
if(confirm('Xóa tất cả mặt hàng?')){products=[];save()}
}

function delProduct(name){
products=products.filter(p=>p.name!==name);
save();
}

function renderProducts(){
productList.innerHTML='';
productSelect.innerHTML='';
products.forEach(p=>{
const d=document.createElement('div');
d.className='line';
d.innerHTML=`<span>${p.name} - ${p.price}đ</span>
<button onclick="delProduct('${p.name}')">❌</button>`;
productList.appendChild(d);
const o=document.createElement('option');
o.value=p.name;o.textContent=p.name;
productSelect.appendChild(o);
});
}

function addReport(){
const dayv=day.value;
const name=productSelect.value;
const qtyv=Number(qty.value);
if(!name||!qtyv)return;
const price=products.find(p=>p.name===name).price;
reports.push({day:dayv,name,qty:qtyv,amount:qtyv*price});
qty.value='';
save();
}

function clearReports(){
if(confirm('Xóa tất cả báo cáo?')){reports=[];save()}
}

function toggleReport(){
report.style.display=report.style.display==='none'?'block':'none';
}

function renderReport(){
report.innerHTML='';
let total=0;
const days=[...new Set(reports.map(r=>r.day))];
days.forEach(d=>{
const h=document.createElement('h3');h.textContent=d;report.appendChild(h);
reports.filter(r=>r.day===d).forEach(r=>{
const l=document.createElement('div');
l.className='line';
l.innerHTML=`<span>${r.qty} ${r.name}: ${r.amount}</span>
<button onclick="delReport('${d}','${r.name}',${r.qty})">❌</button>`;
report.appendChild(l);
total+=r.amount;
});
});
weekTotal.textContent=total;
}

function delReport(d,n,q){
reports=reports.filter(r=>!(r.day===d&&r.name===n&&r.qty===q));
save();
}

function exportTxt(){
let txt='';
reports.forEach(r=>{
txt+=`${r.day}\n${r.qty} ${r.name}: ${r.amount}\n`;
});
txt+=`\nTổng tiền: ${weekTotal.textContent} đ`;
const blob=new Blob([txt],{type:'text/plain'});
const a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='bao_cao.txt';
a.click();
}

function render(){
renderProducts();
renderReport();
}
render();
</script>
</body>
</html>
